
# Monitors

monitorrule=name:eDP-1,scale:1.25


# Exec

exec-once = /usr/lib/xdg-desktop-portal
exec-once = /usr/lib/xdg-desktop-portal-gtk 
exec-once = /usr/lib/xdg-desktop-portal-wlr 
exec-once = waybar
exec-once = systemctl --user start hyprpolkitagent
exec-once = swaybg -i /home/pranjal/Pictures/Downloaded/Mountains.jpg
exec-once = wl-clip-persist --clipboard regular
exec-once = hypridle 


# Misc

drag_tile_to_tile=1

# Animations

animations = 1

# Blur

blur=0

# Opacity

focused_opacity = 0.95
unfocused_opacity = 1

# Appearence

gappih=5
gappiv=5
gappoh=10
gappov=10
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
bordercolor = 0x222222ff
focuscolor  = 0x444444ff
borderpx=2
cursor_size=24
cursor_theme=breeze_cursors




# Rules

# NO RULES


#--------INPUT--------------

trackpad_natural_scrolling=1
tap_to_click=1
drag_lock=0
middle_button_emulation=1
tap_and_drag=1

# -------KEYBINDS-----------

bind=super+shift,r,reload_config
bind=super+shift,x,quit

# Switch to tag

bind=super,1,view,1
bind=super,2,view,2
bind=super,3,view,3
bind=super,4,view,4
bind=super,5,view,5
bind=super,6,view,6
bind=super,7,view,7
bind=super,8,view,8
bind=super,9,view,9
bind=super,0,view,10

# Move window to tag

bind=super+shift,1,tag,1
bind=super+shift,2,tag,2
bind=super+shift,3,tag,3
bind=super+shift,4,tag,4
bind=super+shift,5,tag,5
bind=super+shift,6,tag,6
bind=super+shift,7,tag,7
bind=super+shift,8,tag,8
bind=super+shift,9,tag,9
bind=super+shift,0,tag,10


# Application Binding

bind=super,w,spawn,firefox
bind=super,e,spawn,thunar
bind=super,l,spawn,hyprlock
bind=super,return,spawn,alacritty
bind=super,r,spawn,rofi -show drun
bind=super+shift,s,spawn,grim -s $(slurp) - | wl-copy 

# Window Management

bind=super,q,killclient
bind=super,f,togglefullscreen
bind=super+shift,f,togglemaximizescreen
bind=super,p,togglefloating

bind=super,left,focusdir,left
bind=super,right,focusdir,right
bind=super,up,focusdir,up
bind=super,down,focusdir,down


# ===== Brightness =====
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl -e4 -n2 set 5%+
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl -e4 -n2 set 5%-

# ===== Volume =====
bind=NONE,XF86AudioRaiseVolume,spawn, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

mousebind=SUPER,btn_left,moveresize,curmove
mousebind=NONE,btn_middle,togglemaximizescreen,0
#mousebind=SUPER,btn_right,moveresize,curresize

# ===== Gesture =====
gesturebind=none,left,3,viewtoleft_have_client
gesturebind=none,right,3,viewtoright_have_client

